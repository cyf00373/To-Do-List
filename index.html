<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的待辦事項 My To-Do List</title>
    <style>
        :root {
            --bg-color: #f4f7f6;
            --card-color: #ffffff;
            --text-color: #333333;
            --primary-color: #4a90e2;
            --primary-hover: #357abd;
            --completed-color: #aaaaaa;
            --border-color: #e0e0e0;
            --note-color: #666666;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .todo-container {
            background-color: var(--card-color);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 650px;
        }

        h1 {
            margin-top: 0;
            font-size: 24px;
            color: #2c3e50;
            border-bottom: 2px solid var(--bg-color);
            padding-bottom: 15px;
        }

        .action-bar {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 20px;
        }

        .btn-add-trigger {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .btn-add-trigger:hover {
            background-color: var(--primary-hover);
        }

        .input-panel {
            background-color: var(--bg-color);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            flex-direction: column;
            gap: 12px;
        }

        .input-panel.active {
            display: flex;
        }

        .input-row {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .input-group {
            flex: 1;
            min-width: 200px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .input-panel input[type="text"], 
        .input-panel textarea {
            padding: 8px 12px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-size: 14px;
            font-family: inherit;
        }

        .input-panel textarea {
            resize: vertical;
            min-height: 40px;
        }

        .time-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .input-panel input[type="datetime-local"],
        .input-panel input[type="date"] {
            padding: 7px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-size: 14px;
        }

        .allday-label {
            font-size: 13px;
            color: #555;
            display: flex;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            user-select: none;
        }

        .panel-buttons {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }

        .btn-submit {
            background-color: #2ecc71;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
        }

        .btn-cancel {
            background-color: #e74c3c;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
        }

        .todo-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .todo-item {
            display: flex;
            align-items: flex-start;
            padding: 14px 8px;
            border-bottom: 1px solid var(--border-color);
            transition: all 0.3s ease;
        }

        .todo-item:last-child {
            border-bottom: none;
        }

        .todo-checkbox {
            width: 18px;
            height: 18px;
            margin-right: 12px;
            margin-top: 3px;
            cursor: pointer;
        }

        .todo-body {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .todo-content {
            font-size: 15px;
            word-break: break-all;
            font-weight: 500;
            transition: color 0.3s;
        }

        .todo-memo {
            font-size: 13px;
            color: var(--note-color);
            white-space: pre-wrap;
            word-break: break-all;
            background-color: #f9f9f9;
            padding: 6px 10px;
            border-radius: 4px;
            border-left: 3px solid #cbd5e1;
            margin-top: 2px;
        }

        .todo-meta {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            font-size: 11px;
            color: #888888;
            margin-left: 15px;
            min-width: 135px;
            line-height: 1.5;
            padding-top: 2px;
        }

        /* 完成狀態樣式變更 */
        .todo-item.completed .todo-content {
            text-decoration: line-through;
            color: var(--completed-color);
        }

        .todo-item.completed .todo-memo {
            color: #cccccc;
            border-left-color: #e2e8f0;
            background-color: #fafafa;
        }

        .todo-item.completed .todo-meta {
            color: #cccccc;
        }

        .btn-delete {
            background: none;
            border: none;
            color: #cfd8dc;
            cursor: pointer;
            font-size: 18px;
            margin-left: 10px;
            padding-top: 0;
            transition: color 0.2s;
        }

        .btn-delete:hover {
            color: #e74c3c;
        }
    </style>
</head>
<body>

<div class="todo-container">
    <h1>我的待辦事項 List</h1>
    
    <div class="action-bar">
        <button class="btn-add-trigger" id="btn-show-panel">+ 新增待辦事項</button>
    </div>

    <div class="input-panel" id="input-panel">
        <div class="input-row">
            <div class="input-group">
                <label style="font-size: 12px; color: #666; font-weight: bold;">事項內容 :</label>
                <input type="text" id="todo-text" placeholder="輸入待辦事項..." autocomplete="off">
            </div>
            <div class="input-group">
                <label style="font-size: 12px; color: #666; font-weight: bold;">截止時間 (Dead Line) :</label>
                <div class="time-group" id="time-picker-container">
                    <input type="datetime-local" id="todo-deadline">
                </div>
            </div>
        </div>
        
        <div class="input-group">
            <label style="font-size: 12px; color: #666; font-weight: bold;">備忘錄 / 備註 :</label>
            <textarea id="todo-memo" placeholder="輸入補充說明或備忘紀錄...（選填）"></textarea>
        </div>

        <div class="panel-buttons">
            <label class="allday-label" style="margin-right: auto;">
                <input type="checkbox" id="todo-allday"> 全天事項
            </label>
            <button class="btn-cancel" id="btn-cancel">取消</button>
            <button class="btn-submit" id="btn-add">加入</button>
        </div>
    </div>

    <ul class="todo-list" id="todo-list"></ul>
</div>

<script>
    let todos = [];

    const btnShowPanel = document.getElementById('btn-show-panel');
    const inputPanel = document.getElementById('input-panel');
    const btnCancel = document.getElementById('btn-cancel');
    const btnAdd = document.getElementById('btn-add');
    const todoText = document.getElementById('todo-text');
    const todoMemo = document.getElementById('todo-memo');
    const todoAllday = document.getElementById('todo-allday');
    const timePickerContainer = document.getElementById('time-picker-container');
    const todoList = document.getElementById('todo-list');

    // 初始化讀取 LocalStorage
    window.addEventListener('DOMContentLoaded', () => {
        const localData = localStorage.getItem('my_github_todos_v2');
        if (localData) {
            todos = JSON.parse(localData);
            renderTodos();
        }
        resetTimePicker(false); // 預設非全天
    });

    // 監聽全天勾選狀態，切換對應的 HTML 時間輸入框類型
    todoAllday.addEventListener('change', function() {
        resetTimePicker(this.checked);
    });

    function resetTimePicker(isAllDay) {
        if (isAllDay) {
            timePickerContainer.innerHTML = '<input type="date" id="todo-deadline">';
        } else {
            timePickerContainer.innerHTML = '<input type="datetime-local" id="todo-deadline">';
        }
    }

    btnShowPanel.addEventListener('click', () => {
        inputPanel.classList.add('active');
        todoText.focus();
    });

    btnCancel.addEventListener('click', clearInput);

    function clearInput() {
        todoText.value = '';
        todoMemo.value = '';
        todoAllday.checked = false;
        resetTimePicker(false);
        inputPanel.classList.remove('active');
    }

    function saveToLocalStorage() {
        localStorage.setItem('my_github_todos_v2', JSON.stringify(todos));
    }

    // 新增待辦事項
    function addTodo() {
        const text = todoText.value.trim();
        const memo = todoMemo.value.trim();
        if (text === '') {
            alert('請輸入事項內容！');
            return;
        }

        const now = new Date();
        const createdTimeStr = formatDateTime(now, false);

        // 處理 Deadline 與全天
        const deadlineInput = document.getElementById('todo-deadline');
        const deadlineVal = deadlineInput.value;
        let deadlineStr = '無限制';

        if (deadlineVal) {
            if (todoAllday.checked) {
                // 全天模式只取日期
                const d = new Date(deadlineVal);
                deadlineStr = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')} (全天)`;
            } else {
                deadlineStr = formatDateTime(new Date(deadlineVal), true);
            }
        }

        const newTodo = {
            id: Date.now(),
            text: text,
            memo: memo,
            createdTime: createdTimeStr,
            deadline: deadlineStr,
            completed: false
        };

        todos.push(newTodo);
        saveToLocalStorage();
        renderTodos();
        clearInput();
    }

    // 渲染畫面
    function renderTodos() {
        todoList.innerHTML = '';

        todos.forEach(todo => {
            const li = document.createElement('li');
            li.className = `todo-item ${todo.completed ? 'completed' : ''}`;

            const checkbox = document.createElement('input');
            checkbox.type = 'checkbox';
            checkbox.className = 'todo-checkbox';
            checkbox.checked = todo.completed;
            
            checkbox.addEventListener('change', () => {
                todo.completed = checkbox.checked;
                saveToLocalStorage();
                renderTodos();
            });

            // 主體內容區塊（包含標題與備忘錄）
            const bodyDiv = document.createElement('div');
            bodyDiv.className = 'todo-body';

            const contentSpan = document.createElement('span');
            contentSpan.className = 'todo-content';
            contentSpan.textContent = todo.text;
            bodyDiv.appendChild(contentSpan);

            // 如果有寫備忘錄才渲染出來
            if (todo.memo) {
                const memoDiv = document.createElement('div');
                memoDiv.className = 'todo-memo';
                memoDiv.textContent = todo.memo;
                bodyDiv.appendChild(memoDiv);
            }

            const metaDiv = document.createElement('div');
            metaDiv.className = 'todo-meta';
            metaDiv.innerHTML = `
                <div>建: ${todo.createdTime}</div>
                <div>期: ${todo.deadline}</div>
            `;

            const deleteBtn = document.createElement('button');
            deleteBtn.className = 'btn-delete';
            deleteBtn.innerHTML = '&times;';
            
            deleteBtn.addEventListener('click', () => {
                todos = todos.filter(t => t.id !== todo.id);
                saveToLocalStorage();
                renderTodos();
            });

            li.appendChild(checkbox);
            li.appendChild(bodyDiv);
            li.appendChild(metaDiv);
            li.appendChild(deleteBtn);
            todoList.appendChild(li);
        });
    }

    btnAdd.addEventListener('click', addTodo);
    // 在事項內容或備忘錄按 Ctrl+Enter 也可以送出
    todoText.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') addTodo();
    });

    // 時間格式化輔助函式
    function formatDateTime(date, includeTime) {
        const yyyy = date.getFullYear();
        const mm = String(date.getMonth() + 1).padStart(2, '0');
        const dd = String(date.getDate()).padStart(2, '0');
        if (!includeTime) {
            const hh = String(date.getHours()).padStart(2, '0');
            const min = String(date.getMinutes()).padStart(2, '0');
            return `${yyyy}-${mm}-${dd} ${hh}:${min}`;
        }
        // 如果是設定截止日期的格式
        const hh = String(date.getHours()).padStart(2, '0');
        const min = String(date.getMinutes()).padStart(2, '0');
        return `${yyyy}-${mm}-${dd} ${hh}:${min}`;
    }
</script>

</body>
</html>
