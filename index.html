<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focus Matrix - Loft Edition</title>
    <!-- 引入高質感字體 Inter 與 JetBrains Mono -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* 質感微光高空漸層 */
            --bg-gradient: radial-gradient(circle at 50% 30%, #315371 0%, #111113 80%);
            --card-bg: #1e1e21;         /* 內斂卡片色 */
            --input-bg: #141416;        /* 輸入框沉浸底色 */
            --border-color: #2e2e34;    /* 細緻分隔線 */
            
            --text-main: #ededf0;       /* 主文字 */
            --text-sub: #8e8e93;        /* 次要文字 */
            --text-muted: #5c5c61;      /* 弱化文字 */
            
            --accent-p1: #ef4444;       
            --accent-p2: #f97316;       
            --accent-p3: #eab308;       
            --accent-p4: #64748b;       
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--text-main);
            margin: 0;
            padding: 24px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }

        .app-header {
            max-width: 100%;
            margin: 0 0 20px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 15px;
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin: 0;
            color: #ffffff;
        }

        .btn-add-trigger {
            background-color: #2b2b30;
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 8px 18px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-add-trigger:hover {
            background-color: #383840;
            border-color: #4a4a54;
        }

        /* 彈出輸入面板 */
        .input-panel {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            display: none;
            flex-direction: column;
            gap: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .input-panel.active {
            display: flex;
        }

        .form-row {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }

        .form-group {
            flex: 1;
            min-width: 200px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .form-group label {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-sub);
        }

        input[type="text"], input[type="date"], select {
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-main);
            padding: 8px 12px;
            font-size: 14px;
            font-family: inherit;
            outline: none;
            color-scheme: dark;
        }

        input[type="text"]:focus, input[type="date"]:focus, select:focus {
            border-color: #3b82f6;
        }

        .panel-actions {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-top: 4px;
        }

        .btn-save { background-color: #3b82f6; color: white; border: none; padding: 8px 18px; border-radius: 6px; font-weight: 600; cursor: pointer; }
        .btn-cancel { background-color: transparent; color: var(--text-sub); border: 1px solid var(--border-color); padding: 8px 18px; border-radius: 6px; cursor: pointer; }

        /* 單行四直列 Layout */
        .matrix-grid {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            min-height: 0; /* 確保內部 flex 滾動正常 */
            overflow-x: auto;
        }

        @media (max-width: 1024px) {
            .matrix-grid {
                /* 平板或窄螢幕時可橫向滾動保持直列體驗，或自動適應 */
                min-width: 900px;
            }
        }

        .quadrant {
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.4);
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.05);
            height: 100%;
            box-sizing: border-box;
        }

        .quadrant-header {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 14px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border-color);
            flex-shrink: 0;
        }

        .quadrant-icon {
            font-size: 16px;
        }

        .todo-list {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: 14px;
            flex: 1;
            overflow-y: auto;
            padding-right: 4px;
        }

        /* 自訂滾動條細緻化 */
        .todo-list::-webkit-scrollbar {
            width: 4px;
        }
        .todo-list::-webkit-scrollbar-thumb {
            background: #333338;
            border-radius: 4px;
        }

        /* 單一 TODO 卡片 */
        .todo-card {
            background-color: #141416;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            transition: border-color 0.2s;
        }

        .todo-card:hover {
            border-color: #44444c;
        }

        .todo-top-row {
            display: flex;
            align-items: flex-start;
            gap: 8px;
        }

        .todo-checkbox {
            width: 16px;
            height: 16px;
            margin-top: 3px;
            cursor: pointer;
            accent-color: var(--text-sub);
        }

        .todo-title {
            flex: 1;
            font-size: 14.5px;
            font-weight: 600;
            line-height: 1.35;
            color: #ffffff;
            word-break: break-all;
        }

        .todo-deadline {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: #60a5fa;
            background-color: #0d0d0f;
            padding: 3px 6px;
            border-radius: 4px;
            border: 1px solid #26262b;
            white-space: nowrap;
        }

        .btn-delete {
            background: none;
            border: none;
            color: #484850;
            cursor: pointer;
            font-size: 16px;
            padding: 0 2px;
            transition: color 0.2s;
            line-height: 1;
        }

        .btn-delete:hover {
            color: var(--accent-p1);
        }

        /* 目標與進度區域 */
        .todo-details {
            display: flex;
            flex-direction: column;
            gap: 10px;
            flex: 1;
        }

        .field-box {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        /* 讓進度框區域可以隨文字與拉動擴展 */
        .field-box.progress-box {
            flex: 1;
        }

        .field-label {
            font-size: 10.5px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--text-sub);
        }

        .editable-textbox {
            font-size: 13px;
            color: var(--text-main);
            background-color: #0b0b0c;
            border: 1px solid #26262b;
            border-radius: 6px;
            padding: 8px;
            outline: none;
            font-family: inherit;
            resize: vertical; /* 允許使用者手動自由拉高 */
            line-height: 1.4;
            transition: border-color 0.2s ease;
        }

        .editable-textbox:focus {
            border-color: #3b82f6;
        }

        /* 目標預設固定較小，進度框預設有更高的彈性高度 */
        .goal-textbox {
            min-height: 32px;
            height: 38px;
        }

        .progress-textbox {
            min-height: 150px;
            height: 300px; /* 初始較高的預設值，支援更多列紀錄 */
            flex: 1;
        }

        /* 完成狀態視覺 */
        .todo-card.completed {
            opacity: 0.45;
            background-color: #0f0f11;
        }

        .todo-card.completed .todo-title {
            text-decoration: line-through;
            color: var(--text-muted);
        }

        .todo-card.completed .editable-textbox {
            background-color: transparent;
            border-color: transparent;
            color: var(--text-muted);
            pointer-events: none;
        }
    </style>
</head>
<body>

<div class="app-header">
    <h1>Focusing TO-DO Matrix</h1>
    <button class="btn-add-trigger" id="btn-show-panel">+ 新增事項</button>
</div>

<!-- 新增事項面板 -->
<div class="input-panel" id="input-panel">
    <div class="form-row">
        <div class="form-group" style="flex: 2;">
            <label>待辦事項名稱</label>
            <input type="text" id="todo-text" placeholder="輸入任務..." autocomplete="off">
        </div>
        <div class="form-group">
            <label>優先權</label>
            <select id="todo-quadrant">
                <option value="q1">🚨 重要 ✕ 緊急</option>
                <option value="q2" selected>🎯 重要 ✕ 不緊急</option>
                <option value="q3">⚡ 不重要 ✕ 緊急</option>
                <option value="q4">☕ 不重要 ✕ 不緊急</option>
            </select>
        </div>
    </div>

    <div class="form-row">
        <div class="form-group">
            <label>預期目標 (Goal Target)</label>
            <input type="text" id="todo-goal" placeholder="明確的目標或數據指標..." autocomplete="off">
        </div>
        <div class="form-group">
            <label>當前進度 (Progress Track)</label>
            <input type="text" id="todo-progress" placeholder="階段紀錄、完成度..." autocomplete="off">
        </div>
    </div>

    <!-- 年月日與時間選擇區域 -->
    <div class="form-row">
        <div class="form-group">
            <label>截止日期 (Date)</label>
            <input type="date" id="input-date">
        </div>
        <div class="form-group">
            <label>指定時間 (Time)</label>
            <select id="select-time-slot">
                <option value="allday">全天 (All Day)</option>
                <option value="09:00">09:00</option>
                <option value="12:00">12:00</option>
                <option value="15:00">15:00</option>
                <option value="18:00">18:00</option>
                <option value="21:00">21:00</option>
                <option value="23:59">23:59</option>
            </select>
        </div>
    </div>

    <div class="panel-actions">
        <button class="btn-cancel" id="btn-cancel">取消</button>
        <button class="btn-save" id="btn-add">建立事項</button>
    </div>
</div>

<!-- 單行四直列看板網格 -->
<div class="matrix-grid">
    <div class="quadrant q1">
        <div class="quadrant-header">
            <span class="quadrant-icon">🚨</span> 重要 ✕ 緊急
        </div>
        <ul class="todo-list" id="list-q1"></ul>
    </div>
    <div class="quadrant q2">
        <div class="quadrant-header">
            <span class="quadrant-icon">🎯</span> 重要 ✕ 不緊急
        </div>
        <ul class="todo-list" id="list-q2"></ul>
    </div>
    <div class="quadrant q3">
        <div class="quadrant-header">
            <span class="quadrant-icon">⚡</span> 不重要 ✕ 緊急
        </div>
        <ul class="todo-list" id="list-q3"></ul>
    </div>
    <div class="quadrant q4">
        <div class="quadrant-header">
            <span class="quadrant-icon">☕</span> 不重要 ✕ 不緊急
        </div>
        <ul class="todo-list" id="list-q4"></ul>
    </div>
</div>

<script>
    const STORAGE_KEY = 'loft_matrix_todos_v5';
    let todos = [];

    const btnShowPanel = document.getElementById('btn-show-panel');
    const inputPanel = document.getElementById('input-panel');
    const btnCancel = document.getElementById('btn-cancel');
    const btnAdd = document.getElementById('btn-add');
    
    const todoText = document.getElementById('todo-text');
    const todoQuadrant = document.getElementById('todo-quadrant');
    const todoGoal = document.getElementById('todo-goal');
    const todoProgress = document.getElementById('todo-progress');
    const inputDate = document.getElementById('input-date');
    const selectTimeSlot = document.getElementById('select-time-slot');

    window.addEventListener('DOMContentLoaded', () => {
        const localData = localStorage.getItem(STORAGE_KEY);
        if (localData) {
            todos = JSON.parse(localData);
        }
        renderTodos();
    });

    btnShowPanel.addEventListener('click', () => {
        inputPanel.classList.add('active');
        todoText.focus();
    });

    btnCancel.addEventListener('click', clearInput);

    function clearInput() {
        todoText.value = '';
        todoGoal.value = '';
        todoProgress.value = '';
        inputDate.value = '';
        selectTimeSlot.value = 'allday';
        inputPanel.classList.remove('active');
    }

    function saveToLocalStorage() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(todos));
    }

    /**
     * 智能相對時間計算
     */
    function formatRelativeDate(dateStr, timeSlotStr) {
        if (!dateStr) return '無期限';

        const [year, month, day] = dateStr.split('-').map(Number);
        const target = new Date(year, month - 1, day);
        target.setHours(0, 0, 0, 0);

        const now = new Date();
        const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
        today.setHours(0, 0, 0, 0);

        const diffTime = target.getTime() - today.getTime();
        const diffDays = Math.round(diffTime / (1000 * 60 * 60 * 24));

        const currentDayOfWeek = today.getDay(); 
        const daysToThisSunday = (7 - currentDayOfWeek) % 7;
        const nextSunday = new Date(today);
        nextSunday.setDate(today.getDate() + daysToThisSunday + 7);

        let dateLabel = dateStr;

        if (diffDays === 0) {
            dateLabel = '今天';
        } else if (diffDays === 1) {
            dateLabel = '明天';
        } else if (diffDays === 2) {
            dateLabel = '後天';
        } else if (target > today && target <= nextSunday) {
            const weekNames = ['日', '一', '二', '三', '四', '五', '六'];
            const targetDayOfWeek = target.getDay();
            const thisSunday = new Date(today);
            thisSunday.setDate(today.getDate() + daysToThisSunday);

            if (target <= thisSunday) {
                dateLabel = `這週${weekNames[targetDayOfWeek]}`;
            } else {
                dateLabel = `下週${weekNames[targetDayOfWeek]}`;
            }
        }

        const timeLabel = timeSlotStr === 'allday' ? '' : ` ${timeSlotStr}`;
        return `${dateLabel}${timeLabel}`;
    }

    function addTodo() {
        const text = todoText.value.trim();
        if (text === '') {
            alert('請輸入事項名稱');
            return;
        }

        const newTodo = {
            id: Date.now(),
            text: text,
            quadrant: todoQuadrant.value,
            goal: todoGoal.value.trim(),
            progress: todoProgress.value.trim(),
            rawDate: inputDate.value,
            timeSlot: selectTimeSlot.value,
            completed: false
        };

        todos.push(newTodo);
        saveToLocalStorage();
        renderTodos();
        clearInput();
    }

    function renderTodos() {
        ['q1', 'q2', 'q3', 'q4'].forEach(q => {
            document.getElementById(`list-${q}`).innerHTML = '';
        });

        todos.forEach(todo => {
            const card = document.createElement('li');
            card.className = `todo-card ${todo.completed ? 'completed' : ''}`;

            const topRow = document.createElement('div');
            topRow.className = 'todo-top-row';

            const checkbox = document.createElement('input');
            checkbox.type = 'checkbox';
            checkbox.className = 'todo-checkbox';
            checkbox.checked = todo.completed;
            checkbox.addEventListener('change', () => {
                todo.completed = checkbox.checked;
                saveToLocalStorage();
                renderTodos();
            });

            const title = document.createElement('div');
            title.className = 'todo-title';
            title.textContent = todo.text;

            const deadline = document.createElement('div');
            deadline.className = 'todo-deadline';
            deadline.textContent = formatRelativeDate(todo.rawDate, todo.timeSlot);

            const deleteBtn = document.createElement('button');
            deleteBtn.className = 'btn-delete';
            deleteBtn.innerHTML = '&times;';
            deleteBtn.addEventListener('click', () => {
                todos = todos.filter(t => t.id !== todo.id);
                saveToLocalStorage();
                renderTodos();
            });

            topRow.appendChild(checkbox);
            topRow.appendChild(title);
            topRow.appendChild(deadline);
            topRow.appendChild(deleteBtn);

            const details = document.createElement('div');
            details.className = 'todo-details';

            // 目標 Textbox
            const goalBox = document.createElement('div');
            goalBox.className = 'field-box';
            goalBox.innerHTML = `<span class="field-label">Goal Target</span>`;
            const goalInput = document.createElement('textarea');
            goalInput.className = 'editable-textbox goal-textbox';
            goalInput.value = todo.goal;
            goalInput.placeholder = '設定目標...';
            goalInput.addEventListener('change', () => {
                todo.goal = goalInput.value.trim();
                saveToLocalStorage();
            });

            // 進度追蹤 Textbox（高彈力）
            const progressBox = document.createElement('div');
            progressBox.className = 'field-box progress-box';
            progressBox.innerHTML = `<span class="field-label">Progress Track</span>`;
            const progressInput = document.createElement('textarea');
            progressInput.className = 'editable-textbox progress-textbox';
            progressInput.value = todo.progress;
            progressInput.placeholder = '更新階段紀錄...';
            progressInput.addEventListener('change', () => {
                todo.progress = progressInput.value.trim();
                saveToLocalStorage();
            });

            goalBox.appendChild(goalInput);
            progressBox.appendChild(progressInput);
            details.appendChild(goalBox);
            details.appendChild(progressBox);

            card.appendChild(topRow);
            card.appendChild(details);

            const targetList = document.getElementById(`list-${todo.quadrant}`);
            if (targetList) {
                targetList.appendChild(card);
            }
        });
    }

    btnAdd.addEventListener('click', addTodo);
</script>

</body>
</html>
